name: Build and publish Voynich Nomic Atlas v2

on:
  push:
    branches: [feat/nomic-atlas]
    paths:
      - tools/nomic_atlas/build_publish_v2.py
      - .github/workflows/build-publish-nomic-atlas-v2.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: voynich-nomic-atlas-v2
  cancel-in-progress: false

jobs:
  build-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/nomic-atlas

      - name: Validate required secret
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY repository secret is missing'; exit 2; }
          if [ -z "${HF_TOKEN:-}" ]; then
            echo 'HF_TOKEN is not configured; review queues will contain private crop paths but not embedded thumbnails.'
          fi

      - name: Install pinned dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            nomic==3.9.0 \
            numpy==2.2.6 \
            pandas==2.3.1 \
            scikit-learn==1.7.1 \
            scipy==1.16.0 \
            pyarrow==20.0.0 \
            requests==2.32.4

      - name: Compile production builder
        shell: bash
        run: python -m py_compile tools/nomic_atlas/build_publish_v2.py

      - name: Build enriched datasets and publish public maps
        shell: bash
        run: |
          set -euo pipefail
          python tools/nomic_atlas/build_publish_v2.py 2>&1 | tee atlas-v2-build.log

      - name: Validate output archive
        shell: bash
        run: |
          set -euo pipefail
          test -s voynich-atlas-enriched-v2.zip
          test -s voynich-atlas-enriched-v2.zip.sha256
          sha256sum --check voynich-atlas-enriched-v2.zip.sha256
          unzip -t voynich-atlas-enriched-v2.zip
          python - <<'PY'
          import json
          summary=json.load(open('atlas_v2_output/SUMMARY.json'))
          assert summary['word_rows'] == 37886, summary
          assert summary['proposal_rows'] == 50000, summary
          assert sum(summary['pair_counts'].values()) == 1000, summary
          assert summary['proposal_clusters'] == 32, summary
          for target in summary['targets']:
              assert target['rows'] > 0, target
              assert target['stage'] == 'Completed', target
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload Atlas v2 deliverables
        uses: actions/upload-artifact@v4
        with:
          name: voynich-atlas-enriched-v2
          path: |
            voynich-atlas-enriched-v2.zip
            voynich-atlas-enriched-v2.zip.sha256
            atlas_v2_output/SUMMARY.json
            atlas-v2-build.log
          compression-level: 0
          retention-days: 90
