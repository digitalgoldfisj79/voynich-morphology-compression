name: Cancel obsolete Atlas v2 builder

on:
  push:
    branches: [feat/nomic-atlas]
    paths:
      - .github/workflows/cancel-obsolete-atlas-v2-run.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel obsolete run
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '29288175563'
        shell: bash
        run: |
          set -euo pipefail
          status=$(curl --silent --show-error --output response.txt --write-out '%{http_code}' \
            --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/cancel")
          cat response.txt || true
          case "$status" in
            202|409) echo "Cancel request status: $status" ;;
            *) echo "Unexpected HTTP status: $status"; exit 1 ;;
          esac
