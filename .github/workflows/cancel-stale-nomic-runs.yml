name: Cancel stale Nomic runs

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel stale publisher runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          for run_id in 29278862176 29279401412; do
            status=$(curl --silent --output response.json --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${REPO}/actions/runs/${run_id}/cancel")
            if [[ "$status" != "202" && "$status" != "409" ]]; then
              cat response.json >&2
              echo "Unexpected status ${status} cancelling ${run_id}" >&2
              exit 1
            fi
            echo "Cancellation request for ${run_id}: HTTP ${status}"
          done
