name: Identify Nomic lazy accessor methods

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Identify materialisation methods
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import inspect, os
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          ds=AtlasDataset('edwardbozzard/voynich-dinov3-words-20260713-v1')
          ds._latest_dataset_state()
          m=ds.maps[0]
          for label,obj in [('data',m.data),('embeddings',m.embeddings)]:
              cls=type(obj)
              print('OBJECT',label,cls.__module__,cls.__name__)
              for name in sorted(n for n in dir(obj) if not n.startswith('__')):
                  try:
                      static=inspect.getattr_static(cls,name)
                  except Exception:
                      continue
                  if isinstance(static,property):
                      try:
                          source=inspect.getsource(static.fget)
                      except Exception:
                          source=''
                      print('PROPERTY',name,'SOURCE',source[:5000].replace('\n','\\n'))
                  elif callable(static):
                      try:
                          signature=str(inspect.signature(static))
                      except Exception:
                          signature='?'
                      try:
                          source=inspect.getsource(static)
                      except Exception:
                          source=''
                      print('METHOD',name,signature,'SOURCE',source[:5000].replace('\n','\\n'))
          PY
