name: Verify Nomic row alignment

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Verify metadata and vector row alignment
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import os, numpy as np
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          for identifier in [
              'edwardbozzard/voynich-dinov3-words-20260713-v1',
              'edwardbozzard/voynich-dinov3-proposals-50k-20260713-v1',
          ]:
              ds=AtlasDataset(identifier); ds._latest_dataset_state(); m=ds.maps[0]
              data=m.data.df
              projected=m.embeddings.projected
              latent=np.asarray(m.embeddings.latent)
              print('DATASET',identifier)
              print('DATA',data.shape,list(data.columns),data.head(3).to_dict('records'))
              print('PROJECTED',projected.shape,list(projected.columns),projected.head(3).to_dict('records'))
              print('LATENT',latent.shape,latent.dtype,float(np.linalg.norm(latent[0])))
              common=[c for c in data.columns if c in projected.columns]
              print('COMMON',common)
              for c in common:
                  a=data[c].astype(str).to_numpy(); b=projected[c].astype(str).to_numpy()
                  print('MATCH',c,bool(np.array_equal(a,b)),a[:3].tolist(),b[:3].tolist())
          PY
