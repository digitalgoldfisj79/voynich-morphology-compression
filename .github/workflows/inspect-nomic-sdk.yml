name: Inspect Nomic SDK authenticated export

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Inspect export surface
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import inspect, os
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          for name in ['get_data','add_data','_add_embeddings','get_map']:
              obj=getattr(AtlasDataset,name)
              print('SIGNATURE',name,inspect.signature(obj))
              print('SOURCE',name)
              print(inspect.getsource(obj)[:12000])
          ds=AtlasDataset('edwardbozzard/voynich-dinov3-words-20260713-v1')
          ds._latest_dataset_state()
          print('TOTAL',ds.total_datums)
          print('FIELDS',ds.dataset_fields)
          try:
              sample=ds.get_data(limit=5)
          except TypeError:
              sample=ds.get_data()
          print('SAMPLE_TYPE',type(sample).__name__)
          print('SAMPLE_REPR',repr(sample)[:8000])
          print('PROJECTIONS',[(getattr(p,'id',None),getattr(p,'name',None),getattr(p,'_status',None)) for p in ds.projections])
          PY
