name: Inspect Nomic map export

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Inspect map object and export methods
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import inspect, os
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          ds=AtlasDataset('edwardbozzard/voynich-dinov3-words-20260713-v1')
          ds._latest_dataset_state()
          print('DATASET_DICT',repr(ds.__dict__)[:12000])
          print('MAPS_TYPE',type(ds.maps).__name__,len(ds.maps))
          m=ds.maps[0]
          print('MAP_TYPE',type(m),type(m).__module__,type(m).__name__)
          print('MAP_DICT',repr(getattr(m,'__dict__',{}))[:12000])
          print('MAP_DIR',[n for n in dir(m) if any(k in n.lower() for k in ('data','embed','download','arrow','coord','neighbor','id'))])
          print('MAP_CLASS_SOURCE')
          print(inspect.getsource(type(m))[:30000])
          print('GET_MAP_SOURCE')
          print(inspect.getsource(AtlasDataset.get_map)[:20000])
          for n in dir(m):
              if any(k in n.lower() for k in ('data','embed','download','arrow','coord','neighbor')):
                  try:
                      v=getattr(m,n)
                      print('ATTR',n,type(v).__name__,repr(v)[:5000])
                  except Exception as e:
                      print('ATTR_ERROR',n,type(e).__name__,str(e))
          PY
