name: Resolve Nomic embedding accessor

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Resolve embedding accessor
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import inspect, os
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          ds=AtlasDataset('edwardbozzard/voynich-dinov3-words-20260713-v1')
          ds._latest_dataset_state()
          e=ds.maps[0].embeddings
          cls=type(e)
          print('CLASS',cls.__module__,cls.__name__)
          for name in sorted(n for n in dir(e) if not n.startswith('__')):
              try: static=inspect.getattr_static(cls,name)
              except Exception: continue
              if isinstance(static,property):
                  try: source=inspect.getsource(static.fget)
                  except Exception: source=''
                  print('PROPERTY',name,source.replace('\n',' ')[:1500])
              elif callable(static):
                  try: signature=inspect.signature(static)
                  except Exception: signature='?'
                  print('METHOD',name,signature)
          PY
