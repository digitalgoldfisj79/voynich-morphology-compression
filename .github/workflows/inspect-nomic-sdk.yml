name: Inspect Nomic project inventory

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  pull_request:
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Print compact project inventory
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet requests
          python - <<'PY'
          import json, os, requests
          headers={'Authorization': f'Bearer {os.environ["NOMIC_API_KEY"]}', 'User-Agent':'voynich-audit/1'}
          data=requests.get('https://api-atlas.nomic.ai/v1/organization/edwardbozzard',headers=headers,timeout=60).json()
          rows=[]
          for p in data.get('projects',[]):
              rows.append({
                  'id':p.get('id'),
                  'slug':p.get('slug') or p.get('project_name'),
                  'name':p.get('project_name'),
                  'rows':p.get('total_datums_in_project'),
                  'modality':p.get('modality'),
                  'created':p.get('created_timestamp'),
                  'public':p.get('is_public'),
                  'fields':p.get('project_fields'),
              })
          print(json.dumps(rows,indent=2))
          PY