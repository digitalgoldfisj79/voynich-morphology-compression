name: Inspect Nomic lazy accessors

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Inspect lazy data and embedding accessors
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import inspect, os
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          ds=AtlasDataset('edwardbozzard/voynich-dinov3-words-20260713-v1')
          ds._latest_dataset_state()
          m=ds.maps[0]
          for label,obj in [('data',m.data),('embeddings',m.embeddings)]:
              print('OBJECT',label,type(obj).__module__,type(obj).__name__)
              print('DICT',repr(getattr(obj,'__dict__',{}))[:8000])
              names=[n for n in dir(obj) if not n.startswith('__')]
              print('DIR',names)
              print('CLASS_SOURCE')
              print(inspect.getsource(type(obj))[:25000])
              for n in names:
                  if any(k in n.lower() for k in ('df','table','arrow','download','get','load','embed','numpy','array','data')):
                      try:
                          static=inspect.getattr_static(type(obj),n)
                          print('STATIC',n,type(static).__name__)
                          if isinstance(static,property): print(inspect.getsource(static.fget)[:8000])
                          elif callable(static): print('SIGNATURE',inspect.signature(static)); print(inspect.getsource(static)[:8000])
                      except Exception as e: print('STATIC_ERROR',n,type(e).__name__,str(e))
          PY
