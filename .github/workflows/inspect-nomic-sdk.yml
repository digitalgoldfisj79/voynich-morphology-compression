name: Inspect Nomic map download properties

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Inspect map download properties
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import inspect, os
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          ds=AtlasDataset('edwardbozzard/voynich-dinov3-words-20260713-v1')
          ds._latest_dataset_state()
          m=ds.maps[0]
          names=[n for n in dir(m) if any(k in n.lower() for k in ('data','embed','download','arrow','coord','neighbor','id'))]
          print('MAP_TYPE',type(m).__module__,type(m).__name__)
          print('MAP_DIR',names)
          for n in names:
              try:
                  static=inspect.getattr_static(type(m),n)
                  print('STATIC',n,type(static).__name__)
                  if isinstance(static,property):
                      print(inspect.getsource(static.fget)[:10000])
                  elif callable(static):
                      print('SIGNATURE',inspect.signature(static))
                      print(inspect.getsource(static)[:10000])
              except Exception as e:
                  print('STATIC_ERROR',n,type(e).__name__,str(e))
          print('GET_MAP_SIGNATURE',inspect.signature(AtlasDataset.get_map))
          print(inspect.getsource(AtlasDataset.get_map)[:12000])
          for n in names:
              try:
                  v=getattr(m,n)
                  if callable(v):
                      continue
                  shape=getattr(v,'shape',None)
                  print('VALUE',n,type(v).__name__,'shape=',shape,'repr=',repr(v)[:1000])
              except Exception as e:
                  print('VALUE_ERROR',n,type(e).__name__,str(e))
          PY
