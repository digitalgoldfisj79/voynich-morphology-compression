name: Test Nomic Atlas vector export

on:
  push:
    branches: [feat/nomic-atlas]
    paths: [.github/workflows/inspect-nomic-sdk.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
    steps:
      - name: Download one public Atlas map
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY missing'; exit 2; }
          python -m pip install --quiet nomic==3.9.0 pyarrow pandas numpy
          python - <<'PY'
          import os, numpy as np
          from nomic import AtlasDataset, login
          login(os.environ['NOMIC_API_KEY'])
          ds=AtlasDataset('edwardbozzard/voynich-dinov3-words-20260713-v1')
          ds._latest_dataset_state()
          m=ds.maps[0]
          data=m.data
          embeddings=m.embeddings
          print('DATA_TYPE',type(data).__name__,'SHAPE',getattr(data,'shape',None))
          print('DATA_COLUMNS',getattr(data,'columns',None))
          print('DATA_HEAD',repr(data.head(2) if hasattr(data,'head') else data[:2])[:5000])
          print('EMBEDDINGS_TYPE',type(embeddings).__name__,'SHAPE',getattr(embeddings,'shape',None),'DTYPE',getattr(embeddings,'dtype',None))
          arr=np.asarray(embeddings)
          print('EMBEDDINGS_NORMS',float(np.linalg.norm(arr[0])),float(np.linalg.norm(arr[-1])))
          print('IDS',m.id,m.projection_id,m.atlas_index_id)
          PY
