name: Publish enriched Voynich Atlas v2 100k

on:
  push:
    branches: [feat/nomic-atlas]
    paths:
      - .github/workflows/publish-atlas-v2-100k.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-voynich-atlas-v2-100k
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
      ARCHIVE_URL: https://litter.catbox.moe/o2i4rp.zip
      ARCHIVE_BYTES: '376515197'
      ARCHIVE_SHA256: 8f4c529abf8aca2de7ec0a1c55cc5f05b3b5805e97de6614ed8f961c9ceabd15
      PROPOSAL_DATASET: edwardbozzard/voynich-dinov3-proposals-100k-enriched-20260713-v2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/nomic-atlas

      - name: Validate secret
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || { echo 'NOMIC_API_KEY repository secret is missing'; exit 2; }

      - name: Download and verify derived archive
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import concurrent.futures
          import os
          import time
          import urllib.request
          from pathlib import Path

          url = os.environ['ARCHIVE_URL']
          size = int(os.environ['ARCHIVE_BYTES'])
          parts = 16
          workers = 8
          chunk = (size + parts - 1) // parts
          part_dir = Path('archive-parts')
          part_dir.mkdir(exist_ok=True)

          def download_part(index: int) -> Path:
              start = index * chunk
              end = min(size - 1, start + chunk - 1)
              expected = end - start + 1
              path = part_dir / f'part-{index:02d}'
              for attempt in range(1, 11):
                  try:
                      request = urllib.request.Request(
                          url,
                          headers={
                              'Range': f'bytes={start}-{end}',
                              'User-Agent': 'voynich-atlas-transfer/2',
                          },
                      )
                      with urllib.request.urlopen(request, timeout=600) as response, path.open('wb') as output:
                          if response.status != 206:
                              raise RuntimeError(f'part {index}: HTTP {response.status}, expected 206')
                          content_range = response.headers.get('Content-Range', '')
                          expected_range = f'bytes {start}-{end}/{size}'
                          if content_range != expected_range:
                              raise RuntimeError(f'part {index}: {content_range!r} != {expected_range!r}')
                          while True:
                              block = response.read(1024 * 1024)
                              if not block:
                                  break
                              output.write(block)
                      actual = path.stat().st_size
                      if actual != expected:
                          raise RuntimeError(f'part {index}: {actual} bytes, expected {expected}')
                      print(f'part {index:02d}: {actual} bytes', flush=True)
                      return path
                  except Exception as error:
                      path.unlink(missing_ok=True)
                      if attempt == 10:
                          raise
                      print(f'part {index:02d} attempt {attempt} failed: {error}', flush=True)
                      time.sleep(min(30, 2 * attempt))
              raise AssertionError('unreachable')

          with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as executor:
              paths = list(executor.map(download_part, range(parts)))

          target = Path('voynich-atlas-enriched-v2.zip')
          with target.open('wb') as output:
              for path in paths:
                  with path.open('rb') as source:
                      while True:
                          block = source.read(1024 * 1024)
                          if not block:
                              break
                          output.write(block)
          if target.stat().st_size != size:
              raise SystemExit(f'reassembled archive is {target.stat().st_size} bytes, expected {size}')
          print(f'reassembled {target}: {target.stat().st_size} bytes', flush=True)
          PY
          echo "$ARCHIVE_SHA256  voynich-atlas-enriched-v2.zip" | sha256sum --check
          unzip -t voynich-atlas-enriched-v2.zip
          rm -rf extracted
          mkdir extracted
          unzip -q voynich-atlas-enriched-v2.zip -d extracted
          test -f extracted/voynich_atlas_v2/proposal_bundle/atlas_manifest.json
          test -f extracted/voynich_atlas_v2/proposal_bundle/atlas_embeddings.npy
          test -f extracted/voynich_atlas_v2/review/benchmark_candidates.csv
          test -f extracted/voynich_atlas_v2/review/index.html
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(Path('extracted/voynich_atlas_v2/SUMMARY.json').read_text())
          assert summary['word_rows'] == 37886, summary
          assert summary['proposal_rows'] == 100000, summary
          assert sum(summary['benchmark_pairs'].values()) == 1000, summary
          assert summary['proposal_clusters'] == 32, summary
          assert summary['review_images'] == 350, summary
          print(json.dumps(summary, indent=2))
          PY

      - name: Install pinned Nomic publisher
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install nomic==3.9.0 numpy==2.2.6 pyarrow==20.0.0

      - name: Publish or reuse 100k proposal dataset
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          identifier = os.environ['PROPOSAL_DATASET']
          organization, slug = identifier.split('/', 1)
          url = f'https://api-atlas.nomic.ai/v1/project/{organization}/{slug}'
          marker = Path('reuse-ready-project')
          result_path = Path('extracted/voynich_atlas_v2/proposal_bundle/atlas_publish_result.json')
          try:
              with urllib.request.urlopen(url, timeout=60) as response:
                  project = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  raise SystemExit(0)
              raise
          rows = int(project['total_datums_in_project'])
          ready = [
              projection
              for index in project.get('atlas_indices', [])
              for projection in index.get('projections', [])
              if projection.get('ready') is True
          ]
          if rows != 100000:
              raise SystemExit(f'{identifier}: existing project has {rows} rows, expected 100000; refusing mutation')
          if not ready:
              raise SystemExit(0)
          result = {
              'dataset': identifier,
              'rows_uploaded': 0,
              'total_rows': rows,
              'dataset_link': f'https://atlas.nomic.ai/data/{identifier}',
              'map_link': f'https://atlas.nomic.ai/data/{identifier}/map',
              'index_status': 'Completed',
              'public': True,
              'reused_exact_ready_project': True,
              'ready_projection_count': len(ready),
          }
          result_path.write_text(json.dumps(result, indent=2) + '\n', encoding='utf-8')
          marker.write_text('ready\n', encoding='utf-8')
          print(json.dumps(result, indent=2))
          PY
          if [ -f reuse-ready-project ]; then
            cp extracted/voynich_atlas_v2/proposal_bundle/atlas_publish_result.json nomic-proposal-100k-publish.log
          else
            python tools/nomic_atlas/voynich_atlas.py publish \
              --bundle-dir extracted/voynich_atlas_v2/proposal_bundle \
              --dataset "$PROPOSAL_DATASET" \
              --index-name voynich-dinov3-proposal-map-enriched-100k-v2 \
              --description 'Enriched Voynich DINOv3 proposal map: deterministic 100,000-row sample, 32-cluster diagnostics, medoid distance, held-out EVA transfer, hand, Currier and section metadata.' \
              --public \
              --wait-seconds 900 \
              2>&1 | tee nomic-proposal-100k-publish.log
          fi

      - name: Verify public enriched maps
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' | tee atlas-v2-verification.json
          import json
          import urllib.request

          targets = {
              'voynich-dinov3-words-enriched-20260713-v2': 37886,
              'voynich-dinov3-proposals-100k-enriched-20260713-v2': 100000,
          }
          results = []
          for slug, expected in targets.items():
              url = f'https://api-atlas.nomic.ai/v1/project/edwardbozzard/{slug}'
              with urllib.request.urlopen(url, timeout=60) as response:
                  project = json.load(response)
              rows = int(project['total_datums_in_project'])
              ready = [
                  projection
                  for index in project.get('atlas_indices', [])
                  for projection in index.get('projections', [])
                  if projection.get('ready') is True
              ]
              if rows != expected:
                  raise SystemExit(f'{slug}: {rows} rows, expected {expected}')
              if not ready:
                  raise SystemExit(f'{slug}: no ready projection')
              results.append({
                  'slug': slug,
                  'rows': rows,
                  'ready_projections': len(ready),
                  'dataset_link': f'https://atlas.nomic.ai/data/edwardbozzard/{slug}',
                  'map_link': f'https://atlas.nomic.ai/data/edwardbozzard/{slug}/map',
              })
          print(json.dumps(results, indent=2))
          PY

      - name: Upload durable Atlas v2 deliverable
        uses: actions/upload-artifact@v4
        with:
          name: voynich-atlas-enriched-v2-100k
          path: |
            voynich-atlas-enriched-v2.zip
            extracted/voynich_atlas_v2/SUMMARY.json
            extracted/voynich_atlas_v2/MANIFEST.json
            extracted/voynich_atlas_v2/proposal_bundle/atlas_publish_result.json
            atlas-v2-verification.json
            nomic-proposal-100k-publish.log
          if-no-files-found: error
          compression-level: 0
          retention-days: 90
