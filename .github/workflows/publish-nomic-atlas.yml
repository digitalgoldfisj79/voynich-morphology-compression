name: Publish Voynich DINOv3 Atlas

on:
  workflow_dispatch:
  push:
    branches:
      - feat/nomic-atlas
    paths:
      - .github/workflows/publish-nomic-atlas.yml
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: read
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Require Nomic secret
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NOMIC_API_KEY:-}" || {
            echo "Repository secret NOMIC_API_KEY is not configured." >&2
            exit 1
          }

      - name: Download validated Atlas bundles
        uses: actions/download-artifact@v4
        with:
          name: vdino3-nomic-atlas-bundles
          repository: digitalgoldfisj79/voynich-morphology-compression
          run-id: 29277283414
          github-token: ${{ github.token }}
          path: artifact

      - name: Verify and extract bundles
        shell: bash
        run: |
          set -euo pipefail
          echo 'dfba80552f1bb4db0e2c70dffd1b2e6be8e23cf09cb0089caee797dc2e54ef1d  artifact/vdino3-nomic-atlas-bundles.zip' | sha256sum --check
          mkdir prepared
          unzip -q artifact/vdino3-nomic-atlas-bundles.zip -d prepared
          test -f prepared/vdino3-atlas/publish_to_nomic.py

      - name: Set public visibility and SDK-compatible arrays
        shell: bash
        working-directory: prepared/vdino3-atlas
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('publish_to_nomic.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'is_public=False': 'is_public=True',
              "emb=np.load(b/'atlas_embeddings.npy',mmap_mode='r')": "emb=np.asarray(np.load(b/'atlas_embeddings.npy',mmap_mode='r'),dtype=np.float32)",
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one {old!r}; found {count}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          print('Publisher set to public and memmaps converted to ndarray')
          PY

      - name: Install publisher dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install 'nomic==3.9.0' 'numpy>=1.26,<3'

      - name: Publish public Atlas datasets
        shell: bash
        working-directory: prepared/vdino3-atlas
        run: |
          set +e
          python publish_to_nomic.py 2>&1 | tee nomic_publish.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Preserve publication report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vdino3-nomic-publication-report
          path: |
            prepared/vdino3-atlas/nomic_publish_result.json
            prepared/vdino3-atlas/nomic_publish.log
          if-no-files-found: warn
          retention-days: 30
