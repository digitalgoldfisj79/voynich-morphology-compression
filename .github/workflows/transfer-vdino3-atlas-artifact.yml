name: Transfer vdino3 Atlas artifact

on:
  push:
    branches:
      - feat/nomic-atlas
    paths:
      - .github/workflows/transfer-vdino3-atlas-artifact.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download prepared Atlas bundle
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 10 --retry-all-errors \
            --output vdino3-nomic-atlas-bundles.zip \
            'https://flows-suites-involves-entered.trycloudflare.com/Pce0PYLQKh57ZBKeuDwioPiEYLgXu8AY/vdino3-nomic-atlas-bundles.zip'
          echo 'dfba80552f1bb4db0e2c70dffd1b2e6be8e23cf09cb0089caee797dc2e54ef1d  vdino3-nomic-atlas-bundles.zip' | sha256sum --check

      - name: Upload durable workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vdino3-nomic-atlas-bundles
          path: vdino3-nomic-atlas-bundles.zip
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
