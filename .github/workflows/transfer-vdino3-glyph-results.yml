name: Transfer vdino3 glyph results

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download completed research archive
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 10 --retry-all-errors \
            --output vdino3-glyph-program-results.zip \
            'https://michael-ran-thesis-app.trycloudflare.com/vdino3-glyph-program-results.zip'
          unzip -t vdino3-glyph-program-results.zip
          sha256sum vdino3-glyph-program-results.zip | tee vdino3-glyph-program-results.zip.sha256
      - name: Upload durable artifact
        uses: actions/upload-artifact@v4
        with:
          name: vdino3-glyph-program-results
          path: |
            vdino3-glyph-program-results.zip
            vdino3-glyph-program-results.zip.sha256
          compression-level: 0
          retention-days: 30
